<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeQuest AI | Master Any Language 🌍💻</title>
  <script type="module" crossorigin src="/assets/index-BEH--8Fn.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BGXxQ_L9.css">
</head>

<body>
    <div id="app">
        <!-- Universal Header -->
        <header class="header">
            <div class="header-left">
                <div class="stat-bubble" id="level-badge" title="Your Level">🌱</div>
                <div class="stat-text">
                    <span id="rank-text">Beginner</span>
                </div>
            </div>
            <div class="header-center">
                <div class="stat-item">🔥 <span id="streak-count">0</span></div>
                <div class="stat-item">💎 <span id="xp-count">0</span></div>
            </div>
            <div class="header-right">
                <button id="menu-btn" class="icon-btn">⚙️</button>
            </div>
        </header>

        <main id="main-content">
            <!-- Character Container (Floats above screens) -->
            <div id="character-container" class="character-area">
                <div id="char-image" class="char-sprite">🤖</div>
                <div class="bubble">
                    <p id="char-dialogue">Hey! I'm Byte! Ready to decode some code?</p>
                </div>
            </div>

            <!-- Dynamic Screen Container -->
            <div id="screen-container">
                <!-- Screens will be injected here -->
            </div>
        </main>

        <!-- Feedback Layer -->
        <div id="feedback-layer" class="feedback-panel">
            <div class="feedback-content">
                <div id="feedback-icon" class="fb-icon">🎉</div>
                <div class="fb-text">
                    <h2 id="feedback-title">Correct!</h2>
                    <p id="feedback-msg">+10 XP — You're on fire!</p>
                </div>
                <button id="fb-continue-btn" class="btn btn-primary">Continue</button>
            </div>
        </div>
    </div>
</body>

</html>
