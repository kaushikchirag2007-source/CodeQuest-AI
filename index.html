<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeQuest AI | Master Any Language 🌍💻</title>
    <meta name="description" content="Learn coding and languages with AI-powered, Duolingo-style lessons powered by Gemini AI." />
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div id="app">
        <!-- Universal Header -->
        <header class="header">
            <div class="header-left">
                <button id="back-btn" class="icon-btn hidden" title="Back">⬅️</button>
                <div class="stat-bubble fire">🔥 <span id="streak-count">0</span></div>
                <div class="stat-bubble diamond">💎 <span id="gems-count">0</span></div>
            </div>
            <div class="header-center">
                <span class="rank-text" id="user-level">ELITE CODER</span>
                <span><span id="xp-count">0</span> XP &nbsp; <span id="ai-status" class="ai-badge">Local AI</span></span>
            </div>
            <div class="header-right">
                <button id="profile-btn" class="icon-btn" title="My Profile">👤</button>
            </div>
        </header>

        <main id="main-content">
            <!-- Character Container (Now Layered for Snapdragon-style Customization) -->
            <div id="character-container" class="character-area">
                <div id="avatar-container" class="layered-avatar">
                   <div id="avatar-base" class="avatar-layer">🤖</div>
                   <div id="avatar-hair" class="avatar-layer"></div>
                   <div id="avatar-eyes" class="avatar-layer"></div>
                   <div id="avatar-mouth" class="avatar-layer"></div>
                   <div id="avatar-outfit" class="avatar-layer"></div>
                   <div id="avatar-accessory" class="avatar-layer"></div>
                </div>
                <div class="bubble">
                    <p id="char-dialogue">Initializing CodeQuest AI... Preparing your journey.</p>
                </div>
            </div>

            <!-- Dynamic Screen Container -->
            <div id="screen-container">
                <!-- Screens will be injected here -->
            </div>
        </main>

        <nav class="bottom-nav">
            <button id="nav-learn" class="nav-item active">
                <span class="nav-icon">📖</span>
                <span class="nav-label">Learn</span>
            </button>
            <button id="nav-games" class="nav-item">
                <span class="nav-icon">🎮</span>
                <span class="nav-label">Games</span>
            </button>
            <button id="nav-shop" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">Shop</span>
            </button>
        </nav>

        <!-- Feedback Layer -->
        <div id="feedback-layer" class="feedback-panel">
            <div class="feedback-content">
                <div id="feedback-icon" class="fb-icon">🎉</div>
                <div class="fb-text">
                    <h2 id="feedback-title">Correct!</h2>
                    <p id="feedback-msg">+10 XP — You're on fire!</p>
                </div>
                <button id="fb-continue-btn" class="btn btn-primary">Continue</button>
            </div>
        </div>
        <!-- Developer Credits Footer -->
        <footer class="dev-footer">
            ❤️ Developed by <strong>Chirag</strong> &amp; <strong>Atharv</strong>
        </footer>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h2 id="modal-user-name">👤 User Profile</h2>
            <div class="profile-details">
                <div id="modal-user-avatar" class="char-sprite">🤖</div>
                <p id="modal-user-email">email@example.com</p>
                <div class="stats-grid">
                    <div class="stat-item">XP: <span id="modal-xp">0</span></div>
                    <div class="stat-item">Streak: <span id="modal-streak">0</span></div>
                    <div class="stat-item">Diamonds: <span id="modal-gems">0</span></div>
                </div>
                <div class="theme-toggle-container" style="margin-top: 20px; display: flex; align-items: center; gap: 10px;">
                    <span>🌙 Dark Mode</span>
                    <input type="checkbox" id="theme-switch" style="cursor: pointer; width: 40px; height: 20px;">
                </div>
            </div>
            <div class="modal-actions">
                <button id="edit-char-btn" class="primary-btn" style="background: var(--color-secondary); margin-bottom: 10px;">🎨 Edit Character</button>
                <button id="logout-btn" class="btn-text" style="color: var(--color-wrong-text)">🚪 Log Out</button>
                <button id="close-profile-btn" class="primary-btn">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
